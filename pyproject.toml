[tool.ruff]
target-version = "py313"
line-length = 170
exclude = ["frontend", "node_modules", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.per-file-ignores]
# Prompt strings and generated-code templates are single long literals; wrapping
# them would hurt readability/diffability more than it helps.
"backend/templates.py" = ["E501"]
"backend/repo_integration.py" = ["E501"]
"tests/test_backend.py" = ["E501"]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.mypy]
python_version = "3.13"
exclude = ["frontend", "node_modules", "\\.venv", "tests", "api"]
